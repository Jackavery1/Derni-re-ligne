name: Preview

on:
    pull_request:
        branches: [main, master]

permissions:
    contents: read

jobs:
    preview:
        uses: ./.github/workflows/quality.yml
        with:
            upload_dist: true

    package:
        needs: preview
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Préparer artefact statique (bundle prod)
              run: |
                  mkdir -p _site
                  cp -r dist/* _site/
            - uses: actions/upload-artifact@v4
              with:
                  name: site-preview
                  path: _site
                  retention-days: 7
