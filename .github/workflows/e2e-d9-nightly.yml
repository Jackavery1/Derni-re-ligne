name: E2E campagne D9 (nightly)

on:
    schedule:
        - cron: '0 3 * * 0'
    workflow_dispatch:

jobs:
    d9-narratif:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - name: Campagne complete audit D9 (narratif)
              run: npm run test:e2e:d9
