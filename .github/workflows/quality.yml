name: Quality

on:
    workflow_call:
        inputs:
            upload_dist:
                description: Publier dist/ en artefact
                type: boolean
                default: false
            upload_coverage:
                description: Publier coverage/ en artefact
                type: boolean
                default: false
jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - run: npm ci
            - run: npm run lint
            - run: npm run check:circular
            - run: npm run check:outdated
            - run: npm run typecheck
            - run: npm run format:check
            - run: npm run verify:histoire-json
            - run: node scripts/exporter-donnees-json.mjs
            - run: npm run test:coverage
            - run: npm audit --audit-level=moderate
            - run: npm run build
            - run: node scripts/generer-precache.mjs --prod
            - run: npm run audit:poids
            - run: npm run analyze
            - name: Budget taille bundle prod
              run: node scripts/verifier-bundle.mjs
            - run: npx playwright install --with-deps chromium
            - name: Smoke E2E dist
              run: npm run test:e2e:smoke:dist
            - name: Responsive multi-viewport (dist)
              run: npm run test:e2e:responsive:dist
            - name: Budget perf chargement
              run: npm run test:e2e:perf
            - name: Lighthouse (warn)
              run: npx --yes @lhci/cli autorun --config=lighthouserc.cjs
              continue-on-error: true
            - name: Lighthouse mobile (warn)
              run: npx --yes @lhci/cli autorun --config=lighthouserc-mobile.cjs
              continue-on-error: true
            - name: Responsive multi-viewport (sources)
              run: npm run test:e2e:responsive
            - name: Audits gameplay, responsive et narratif
              run: npm run test:e2e:audit
            - run: npm run test:e2e
            - name: Artefact couverture
              if: inputs.upload_coverage
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage/
                  retention-days: 14
            - name: Artefact dist
              if: inputs.upload_dist
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7
