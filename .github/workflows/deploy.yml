name: Deploy

on:
    push:
        branches: [main, master]
        tags: ['v*']

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    test:
        uses: ./.github/workflows/quality.yml
        with:
            upload_dist: true

    deploy:
        needs: test
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - uses: actions/checkout@v4
            - name: Préparer artefact statique (bundle prod)
              run: |
                  mkdir -p _site
                  cp -r dist/* _site/
                  cp LICENSE README.md _site/ 2>/dev/null || true
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v5
              with:
                  path: _site
            - id: deployment
              uses: actions/deploy-pages@v4
            - name: Smoke post-déploiement
              if: steps.deployment.outputs.page_url != ''
              run: |
                  BASE="${{ steps.deployment.outputs.page_url }}"
                  curl -fsSL "$BASE" | grep -q "Dernière Ligne"
                  curl -fsSL "${BASE}js/bundle.js" -o /dev/null
