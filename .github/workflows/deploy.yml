name: Deploy

on:
    push:
        branches: [main, master]
        tags: ['v*']
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pages-verify
    cancel-in-progress: true

jobs:
    test:
        uses: ./.github/workflows/quality.yml
        with:
            upload_dist: false

    verify-pages:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Smoke production (GitHub Pages — branche main)
              run: |
                  BASE="https://jackavery1.github.io/Derni-re-ligne/"
                  VERSION=$(node -p "require('./package.json').version")
                  for attempt in 1 2 3 4 5 6 7 8; do
                    echo "Tentative ${attempt}/8…"
                    if HTML=$(curl -fsSL "$BASE" 2>/dev/null) \
                      && echo "$HTML" | grep -q "Dernière Ligne" \
                      && echo "$HTML" | grep -q "js/main.js?v=${VERSION}" \
                      && curl -fsSL "${BASE}js/main.js" -o /dev/null \
                      && curl -fsSL "${BASE}sw.js" | grep -q "VERSION_SHELL = 'dl-shell-v" \
                      && echo "$HTML" | grep -q "frame-ancestors"; then
                      echo "Pages OK — sources main v${VERSION}"
                      exit 0
                    fi
                    sleep 30
                  done
                  echo "Échec : le site ne reflète pas main v${VERSION} après ~4 min"
                  exit 1
