name: Deploy

on:
  push:
    branches: [main, master]
    tags: ['v*']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm audit --audit-level=high || true
      - run: npx playwright install chromium
      - run: npm run test:e2e

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Préparer artefact statique
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js _site/
          cp -r styles js fonts _site/
          cp icon.svg icon-192.png icon-512.png icon-maskable.png _site/ 2>/dev/null || true
          cp LICENSE README.md _site/ 2>/dev/null || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
