<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dernière Ligne</title>
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#08081a" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <link rel="icon" href="img/icon-192.png" type="image/png" />
        <link rel="apple-touch-icon" href="img/icon-192.png" />
        <!-- CSP stricte : pas de style/script inline — utiliser classes CSS et fichiers externes -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"
        />
        <link
            rel="preload"
            href="assets/polices/press-start-2p-latin-400-normal.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="assets/polices/rajdhani-latin-400-normal.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link rel="stylesheet" href="styles/main.css" />
    </head>
    <body>
        <a href="#conteneur-ecrans" class="sr-only sr-only-focusable">Aller au contenu</a>

        <div id="banniere-erreur" role="alert" aria-live="assertive">
            <span id="banniere-erreur-texte">Erreur de chargement</span>
            <div id="banniere-erreur-actions">
                <button class="bouton" type="button" id="btn-copier-rapport-erreur">
                    COPIER RAPPORT
                </button>
                <button class="bouton" type="button" id="btn-recharger-erreur">RECHARGER</button>
            </div>
        </div>

        <div id="annonce-jeu" class="sr-only" aria-live="polite" aria-atomic="true"></div>

        <div id="notif-maj-sw" role="status">
            <span>Nouvelle version disponible</span>
            <button class="bouton" id="btn-maj-sw" type="button">METTRE À JOUR</button>
        </div>

        <div id="conteneur-ecrans" tabindex="-1"></div>

        <script type="module" src="js/main.js?v=2.5.15"></script>
    </body>
</html>
