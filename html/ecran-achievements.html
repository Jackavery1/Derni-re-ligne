<div id="ecran-achievements" class="ecran">
    <canvas class="canvas-fond-meta" id="fond-meta-memorial"></canvas>
    <div class="ach-galerie-contenu">
        <div class="ach-galerie-titre">MEMORIAL DE LA TRAME</div>
        <div class="ach-galerie-soustitre" id="ach-compteur"></div>
        <div class="ach-filtre-histoire" role="group" aria-label="Filtrer les exploits">
            <button
                class="ach-filtre-btn actif"
                type="button"
                data-filtre="tous"
                aria-label="Tous les exploits"
            >
                TOUS
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="score"
                aria-label="Exploits score"
            >
                SCORE
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="biomes"
                aria-label="Exploits biomes"
            >
                BIOMES
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire"
                aria-label="Exploits histoire"
            >
                HISTOIRE
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire_boss"
                aria-label="Exploits boss"
            >
                BOSS
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire_vera"
                aria-label="Exploits VERA"
            >
                VERA
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire_fins"
                aria-label="Exploits fins"
            >
                FINS
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire_secrets"
                aria-label="Exploits secrets"
            >
                SECRETS
            </button>
            <button
                class="ach-filtre-btn"
                type="button"
                data-filtre="histoire_prouesses"
                aria-label="Exploits prouesses"
            >
                PROUESSES
            </button>
        </div>
        <div id="ach-galerie-grille" class="ach-galerie-grille"></div>
        <button
            class="bouton discret element-masque"
            type="button"
            id="btn-achievements-codex"
            aria-hidden="true"
            hidden
        >
            CODEX
        </button>
        <button class="bouton discret" type="button" id="btn-achievements-retour">← RETOUR</button>
    </div>
</div>
