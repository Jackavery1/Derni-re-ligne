<div id="ecran-codex" class="ecran">
    <canvas class="canvas-fond-meta" id="fond-meta-codex"></canvas>
    <div class="codex-contenu">
        <div class="codex-header">
            <div class="codex-titre">CODEX</div>
            <div id="codex-progression" class="codex-progression"></div>
        </div>

        <div class="codex-onglets" role="tablist" aria-label="Chapitres du codex">
            <button
                class="codex-onglet actif"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="codex-liste"
                data-chapitre="mondes"
            >
                MONDES
            </button>
            <button
                class="codex-onglet"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="codex-liste"
                data-chapitre="reliques"
            >
                RELIQUES
            </button>
            <button
                class="codex-onglet"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="codex-liste"
                data-chapitre="chroniques"
            >
                CHRONIQUES
            </button>
        </div>

        <div id="codex-liste" class="codex-liste" role="tabpanel"></div>

        <button class="bouton discret" type="button" id="btn-codex-retour">← RETOUR</button>
    </div>
</div>
