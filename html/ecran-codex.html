<div id="ecran-codex" class="ecran">
    <div class="codex-contenu">
        <div class="codex-header">
            <div class="codex-titre">CODEX</div>
            <div id="codex-progression" class="codex-progression"></div>
        </div>

        <div class="codex-onglets">
            <button class="codex-onglet actif" type="button" data-chapitre="mondes">
                🌍 MONDES
            </button>
            <button class="codex-onglet" type="button" data-chapitre="reliques">⊗ RELIQUES</button>
            <button class="codex-onglet" type="button" data-chapitre="chroniques">
                📖 CHRONIQUES
            </button>
        </div>

        <div id="codex-liste" class="codex-liste"></div>

        <div id="codex-lecteur" class="codex-lecteur element-masque">
            <button class="codex-btn-fermer" type="button" id="btn-codex-fermer">✕ FERMER</button>
            <canvas id="canvas-illust-codex" width="240" height="120" class="codex-illust"></canvas>
            <div id="codex-entree-icone" class="codex-entree-icone"></div>
            <div id="codex-entree-titre" class="codex-entree-titre"></div>
            <div id="codex-entree-sous-titre" class="codex-entree-sous-titre"></div>
            <div id="codex-entree-texte" class="codex-entree-texte"></div>
        </div>

        <button class="bouton discret" type="button" id="btn-codex-retour">← RETOUR</button>
    </div>
</div>
