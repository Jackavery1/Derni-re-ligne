<div id="conteneur-principal">
    <div id="interface-echelle">
        <div id="interface-jeu">
            <!-- Panneau gauche : réserve + statistiques -->
            <aside class="panneau">
                <div class="section">
                    <div class="section-titre" data-label="hold">HOLD</div>
                    <canvas
                        id="canvas-reserve"
                        class="canvas-preview"
                        width="104"
                        height="72"
                    ></canvas>
                </div>
                <div class="section">
                    <div class="stat">
                        <span class="stat-label" data-label="score">SCORE</span>
                        <span class="stat-valeur" id="affichage-score">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-label="lignes">LIGNES</span>
                        <span class="stat-valeur" id="affichage-lignes">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-label="niveau">NIVEAU</span>
                        <span class="stat-valeur" id="affichage-niveau">1</span>
                    </div>
                    <div id="section-progression">
                        <span id="affichage-restant">10 ▸ NIV.2</span>
                        <div id="barre-progression-wrapper">
                            <div id="barre-progression-fill"></div>
                        </div>
                    </div>
                    <div class="stat">
                        <span class="stat-label">TEMPS</span>
                        <span class="stat-valeur" id="affichage-temps">00:00</span>
                    </div>
                </div>
                <div id="section-vivant" class="section" style="display: none">
                    <div class="section-titre" id="vivant-label-titre">LE VIVANT</div>
                    <div
                        style="
                            font-size: 0.3rem;
                            color: var(--texte-dim);
                            letter-spacing: 1px;
                            text-align: center;
                        "
                        id="vivant-label-nom"
                    ></div>
                    <div
                        style="
                            width: 100%;
                            height: 3px;
                            background: rgba(255, 255, 255, 0.1);
                            margin-top: 4px;
                            overflow: hidden;
                        "
                    >
                        <div
                            id="vivant-barre"
                            style="height: 100%; width: 0%; transition: width 0.5s linear"
                        ></div>
                    </div>
                </div>
                <div id="section-oracle-stats" class="section element-masque">
                    <div class="section-titre">ORACLE</div>
                    <div class="stat">
                        <span class="stat-label">MULT.</span>
                        <span class="stat-valeur oracle-mult-vert" id="oracle-mult">×1.0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">DÉVIATIONS</span>
                        <span class="stat-valeur oracle-dev-val" id="oracle-dev">0</span>
                    </div>
                </div>
                <div class="section" id="indicateur-vide-actif" style="display: none">
                    <div class="section-titre" style="color: rgba(255, 255, 255, 0.2)">LE VIDE</div>
                    <div
                        style="
                            font-size: 0.26rem;
                            color: rgba(255, 255, 255, 0.15);
                            letter-spacing: 1px;
                            text-align: center;
                        "
                    >
                        SIGNAL PERDU
                    </div>
                </div>
            </aside>

            <!-- Zone centrale : canvas du jeu -->
            <main id="zone-jeu">
                <div id="couronne" aria-hidden="true">👑</div>
                <canvas
                    id="canvas-plateau"
                    width="320"
                    height="640"
                    role="application"
                    aria-label="Plateau de jeu Dernière Ligne, 10 colonnes sur 20 lignes. Utilisez le clavier ou les contrôles tactiles."
                ></canvas>
            </main>

            <!-- Panneau droit : prochaine pièce + mascotte -->
            <aside class="panneau">
                <div class="section">
                    <div class="section-titre" data-label="next">NEXT</div>
                    <canvas
                        id="canvas-preview"
                        class="canvas-preview"
                        width="104"
                        height="210"
                    ></canvas>
                    <div id="indicateur-relique" class="element-masque">
                        <span id="relique-icone"></span>
                        <span id="relique-nom"></span>
                    </div>
                </div>

                <div class="section" id="section-boss" style="display: none">
                    <div class="section-titre boss-nom" id="boss-nom-affiche">BOSS</div>
                    <div id="boss-hp-wrapper">
                        <div id="boss-hp-fill" style="width: 100%"></div>
                    </div>
                    <div id="boss-hp-label" class="boss-hp-label">0 / 0</div>
                    <canvas
                        id="canvas-boss-portrait"
                        width="108"
                        height="90"
                        aria-label="Portrait du boss"
                    ></canvas>
                    <div id="boss-attaque-label" class="boss-attaque-label"></div>
                    <div id="boss-timer-label" class="boss-timer-label"></div>
                </div>

                <div class="section">
                    <button id="btn-pause" type="button" aria-label="Mettre en pause">

                    <button
                        id="btn-mute"
                        type="button"
                        aria-label="Couper ou activer le son"
                        aria-pressed="false"
                    >
                        🔊
                    </button>
                    <div id="indicateur-meteo" class="element-masque">
                        <span id="meteo-actif-icone"></span>
                        <span id="meteo-actif-nom"></span>
                        <div id="meteo-barre-duree"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>
