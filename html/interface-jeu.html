<div id="conteneur-principal">
    <canvas id="canvas-fond-biome" aria-hidden="true"></canvas>
    <div id="interface-echelle">
        <div id="interface-jeu">
            <!-- Panneau gauche : reserve + statistiques -->
            <aside class="panneau">
                <div class="section">
                    <div class="section-titre" data-label="hold">HOLD</div>
                    <canvas
                        id="canvas-reserve"
                        class="canvas-preview"
                        width="104"
                        height="72"
                    ></canvas>
                </div>
                <div class="section">
                    <div class="stat">
                        <span class="stat-label" data-label="score">SCORE</span>
                        <span class="stat-valeur" id="affichage-score">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-label="lignes">LIGNES</span>
                        <span class="stat-valeur" id="affichage-lignes">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-label="niveau">NIVEAU</span>
                        <span class="stat-valeur" id="affichage-niveau">1</span>
                    </div>
                    <div id="section-progression">
                        <span id="affichage-restant">10 ▸ NIV.2</span>
                        <div id="barre-progression-wrapper">
                            <div id="barre-progression-fill"></div>
                        </div>
                    </div>
                    <div class="stat">
                        <span class="stat-label">TEMPS</span>
                        <span class="stat-valeur" id="affichage-temps">00:00</span>
                    </div>
                </div>
                <div id="section-vivant" class="section element-masque">
                    <div class="section-titre" id="vivant-label-titre">LE VIVANT</div>
                    <div class="vivant-sous-titre" id="vivant-label-nom"></div>
                    <div class="vivant-barre-piste">
                        <div id="vivant-barre" class="vivant-barre-fill"></div>
                    </div>
                </div>
                <div id="section-oracle-stats" class="section element-masque">
                    <div class="section-titre">ORACLE</div>
                    <div class="stat">
                        <span class="stat-label">MULT.</span>
                        <span class="stat-valeur oracle-mult-vert" id="oracle-mult">×1.0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">DEVIATIONS</span>
                        <span class="stat-valeur oracle-dev-val" id="oracle-dev">0</span>
                    </div>
                </div>
                <div class="section element-masque" id="section-objectifs-histoire">
                    <div class="section-titre objectif-hud-titre">OBJECTIFS</div>
                    <div id="hud-objectif-lignes" class="objectif-hud-lignes">
                        <span id="hud-objectif-lignes-val">LIGNES 0/0</span>
                        <span id="hud-flash-vitesse" class="hud-flash-vitesse">VITESSE +</span>
                    </div>
                    <div id="hud-objectif-boss" class="objectif-hud-boss element-masque">
                        <div id="hud-boss-jauge-wrap" class="hud-boss-jauge-wrap">
                            <div id="hud-boss-jauge-fill" class="hud-boss-jauge-fill"></div>
                        </div>
                        <span id="hud-boss-phase" class="hud-boss-phase">PHASE 1</span>
                    </div>
                    <div id="hud-palier-val" class="objectif-hud-palier">VITESSE 1/1</div>
                    <div
                        id="hud-modificateur-biome"
                        class="objectif-hud-modificateur element-masque"
                        aria-live="polite"
                    ></div>
                    <div class="objectif-hud-etoiles">
                        <span
                            id="hud-etoile-0"
                            class="objectif-hud-etoile objectif-hud-etoile-active"
                            aria-hidden="true"
                            >★</span
                        >
                        <span id="hud-etoile-1" class="objectif-hud-etoile" aria-hidden="true"
                            >★</span
                        >
                        <span id="hud-etoile-2" class="objectif-hud-etoile" aria-hidden="true"
                            >★</span
                        >
                    </div>
                </div>
                <div class="section element-masque" id="indicateur-vide-actif">
                    <div class="section-titre section-vide-titre">LE VIDE</div>
                    <div class="section-vide-msg">SIGNAL PERDU</div>
                </div>
            </aside>

            <!-- Zone centrale : canvas du jeu -->
            <main id="zone-jeu">
                <canvas
                    id="canvas-plateau"
                    width="320"
                    height="640"
                    tabindex="0"
                    role="application"
                    aria-label="Plateau de jeu Derniere Ligne, 10 colonnes sur 20 lignes. Utilisez le clavier ou les contrôles tactiles."
                ></canvas>
            </main>

            <!-- Panneau droit : prochaine piece + mascotte -->
            <aside class="panneau">
                <div class="section">
                    <div class="section-titre" data-label="next">NEXT</div>
                    <canvas
                        id="canvas-preview"
                        class="canvas-preview"
                        width="104"
                        height="210"
                    ></canvas>
                    <div id="indicateur-relique" class="element-masque">
                        <span id="relique-icone"></span>
                        <span id="relique-nom"></span>
                    </div>
                </div>

                <div class="section element-masque" id="section-boss">
                    <div class="section-titre boss-nom" id="boss-nom-affiche">BOSS</div>
                    <div id="boss-hp-wrapper">
                        <div id="boss-hp-fill" class="boss-hp-fill-init"></div>
                    </div>
                    <div id="boss-hp-label" class="boss-hp-label">0 / 0</div>
                    <canvas
                        id="canvas-boss-portrait"
                        width="108"
                        height="90"
                        aria-label="Portrait du boss"
                    ></canvas>
                    <div id="boss-attaque-label" class="boss-attaque-label"></div>
                    <div id="boss-timer-label" class="boss-timer-label"></div>
                </div>

                <div class="section" id="section-mascotte">
                    <div class="section-titre" data-label="robo">ROBO</div>
                    <canvas
                        id="canvas-mascotte"
                        width="120"
                        height="150"
                        aria-hidden="true"
                    ></canvas>
                </div>

                <div class="section">
                    <button id="btn-pause" type="button" aria-label="Mettre en pause">
                        ⏸ PAUSE
                    </button>
                    <button
                        id="btn-mute"
                        type="button"
                        aria-label="Couper ou activer le son"
                        aria-pressed="false"
                    >
                        🔊
                    </button>
                    <div id="indicateur-meteo" class="element-masque">
                        <span id="meteo-actif-icone"></span>
                        <span id="meteo-actif-nom"></span>
                        <div id="meteo-barre-duree"></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>

<div
    id="overlay-objectifs-pre"
    class="objectif-overlay element-masque"
    role="dialog"
    aria-modal="true"
    aria-labelledby="objectif-monde-nom"
>
    <div class="objectif-panneau">
        <p class="objectif-chapitre" id="objectif-monde-chapitre">PROLOGUE</p>
        <h2 class="objectif-monde-nom" id="objectif-monde-nom">L'EVEIL</h2>
        <p class="objectif-principal-label">OBJECTIF</p>
        <p class="objectif-principal-texte" id="objectif-principal-texte">EFFACEZ 8 LIGNES</p>
        <div class="objectif-etoiles-liste">
            <div class="objectif-etoile-slot" id="objectif-etoile-principale">
                <span class="objectif-etoile-icone" aria-hidden="true">★</span>
                <span class="objectif-etoile-libelle">Objectif principal</span>
            </div>
            <div class="objectif-etoile-slot" id="objectif-etoile-2">
                <span class="objectif-etoile-icone" aria-hidden="true">★</span>
                <span class="objectif-etoile-libelle"></span>
            </div>
            <div class="objectif-etoile-slot" id="objectif-etoile-3">
                <span class="objectif-etoile-icone" aria-hidden="true">★</span>
                <span class="objectif-etoile-libelle"></span>
            </div>
        </div>
        <button type="button" class="bouton objectif-btn-commencer" id="btn-objectifs-commencer">
            COMMENCER
        </button>
    </div>
</div>

<div
    id="overlay-recap-monde"
    class="objectif-overlay element-masque"
    role="dialog"
    aria-modal="true"
    aria-labelledby="recap-monde-nom"
>
    <div class="objectif-panneau objectif-recap">
        <p class="objectif-recap-titre">MONDE COMPLETE</p>
        <h2 class="objectif-monde-nom" id="recap-monde-nom">MONDE</h2>
        <div class="objectif-recap-etoiles">
            <span id="recap-etoile-0" class="objectif-recap-etoile" aria-hidden="true">★</span>
            <span id="recap-etoile-1" class="objectif-recap-etoile" aria-hidden="true">★</span>
            <span id="recap-etoile-2" class="objectif-recap-etoile" aria-hidden="true">★</span>
        </div>
        <p class="objectif-recap-revelation element-masque" id="recap-etoile-3-libelle"></p>
    </div>
</div>

<div
    id="overlay-boss-presentation"
    class="overlay-boss-presentation element-masque"
    aria-hidden="true"
>
    <div class="boss-presentation-contenu">
        <div id="boss-presentation-nom" class="boss-presentation-nom"></div>
        <div id="boss-presentation-epithete" class="boss-presentation-epithete"></div>
    </div>
</div>
