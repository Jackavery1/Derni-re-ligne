<div id="ecran-game-over" class="ecran">
    <div class="go-contenu">
        <div class="go-coins"></div>

        <!-- Pieces decoratives pixelisees -->
        <div class="go-deco">
            <span class="go-deco-rose">▓▓</span>
            <span class="go-deco-cyan">▓▓▓</span>
            <span class="go-deco-violet">▓▓</span>
        </div>

        <!-- Titre avec animation glitch -->
        <div class="go-titre" data-label="gameOver">GAME OVER</div>
        <p id="go-boss-replique" class="go-boss-replique element-masque"></p>

        <!-- Separateur lumineux -->
        <div class="go-separateur"></div>

        <!-- Grille 2×2 des statistiques -->
        <div class="go-stats">
            <div class="go-stat">
                <span class="go-stat-label" data-label="score">SCORE</span>
                <span class="go-stat-valeur jaune" id="score-final">0</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label" data-label="lignes">LIGNES</span>
                <span class="go-stat-valeur cyan" id="lignes-finales">0</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label" data-label="niveau">NIVEAU</span>
                <span class="go-stat-valeur vert" id="niveau-final">1</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label" data-label="record">RECORD</span>
                <span class="go-stat-valeur violet" id="record-final">0</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label">TEMPS</span>
                <span class="go-stat-valeur cyan" id="temps-final">00:00</span>
            </div>
            <div class="go-stat go-stat-oracle element-masque" id="oracle-bonus-go-wrap">
                <span class="go-stat-label">BONUS ORACLE</span>
                <span class="go-stat-valeur oracle-bonus-val" id="oracle-bonus-go">+0</span>
            </div>
        </div>

        <div id="bloc-melodie">
            <div class="melodie-titre-label">VOTRE COMPOSITION</div>
            <div id="melodie-titre-oeuvre" class="melodie-titre-oeuvre"></div>
            <canvas
                id="canvas-melodie"
                width="380"
                height="80"
                aria-label="Visualisation piano roll de votre melodie"
            ></canvas>
            <button
                id="btn-reecouter"
                class="bouton bouton-melodie"
                type="button"
                aria-label="Reecouter la composition"
            >
                ▶ REECOUTER
            </button>
        </div>

        <!-- Badge nouveau record (affiche si battu) -->
        <div id="badge-record" class="element-masque">★ NOUVEAU RECORD ★</div>

        <!-- Boutons -->
        <div class="go-boutons">
            <button class="bouton" type="button" id="btn-rejouer" aria-label="Rejouer">
                ▶ REJOUER
            </button>
            <button
                class="bouton discret element-masque"
                type="button"
                id="btn-profil-gameover"
                aria-label="Voir le profil de la partie"
                aria-hidden="true"
                hidden
            >
                📊 MON PROFIL
            </button>
            <button
                class="bouton discret bouton-histoire-carte element-masque"
                type="button"
                id="btn-histoire-carte"
                aria-label="Retourner à la carte histoire"
            >
                🗺 CONTINUER
            </button>
            <button
                class="bouton bouton-continue-boss element-masque"
                type="button"
                id="btn-continue-boss"
                aria-label="Continuer le combat boss gratuitement"
            >
                ↺ CONTINUER (GRATUIT)
            </button>
            <p
                id="go-avertissement-trame"
                class="go-avertissement-trame element-masque"
                role="status"
            ></p>
            <p id="go-continues-campagne" class="go-continues-campagne element-masque"></p>
            <button class="bouton discret" type="button" id="btn-menu" aria-label="Retour au menu">
                MENU
            </button>
        </div>
    </div>
</div>
