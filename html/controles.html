<div id="controles-mobile">
    <div class="rangee">
        <button class="btn-tactile violet large" id="btn-reserve" aria-label="Réserver la pièce">
            HOLD
        </button>
        <button class="btn-tactile violet" id="btn-rotation" aria-label="Tourner la pièce">
            ↻
        </button>
        <button class="btn-tactile rouge large" id="btn-chute" aria-label="Chute rapide">
            ⬇DROP
        </button>
    </div>
    <div class="rangee">
        <button class="btn-tactile" id="btn-gauche" aria-label="Déplacer à gauche">◀</button>
        <button class="btn-tactile" id="btn-bas" aria-label="Descendre">▼</button>
        <button class="btn-tactile" id="btn-droite" aria-label="Déplacer à droite">▶</button>
    </div>
</div>

<div id="controles-paysage">
    <div class="ctrl-col ctrl-gauche">
        <button class="btn-tactile" id="btn-gauche-p" aria-label="Déplacer à gauche">◀</button>
        <button class="btn-tactile" id="btn-droite-p" aria-label="Déplacer à droite">▶</button>
        <button class="btn-tactile" id="btn-bas-p" aria-label="Descendre">▼</button>
    </div>
    <div class="ctrl-col ctrl-droite">
        <button class="btn-tactile violet" id="btn-rotation-p" aria-label="Tourner la pièce">
            ↻
        </button>
        <button class="btn-tactile rouge" id="btn-chute-p" aria-label="Chute rapide">⬇</button>
        <button class="btn-tactile violet large" id="btn-reserve-p" aria-label="Réserver la pièce">
            HLD
        </button>
    </div>
</div>
