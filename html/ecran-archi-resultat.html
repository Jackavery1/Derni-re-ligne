<div id="ecran-archi-resultat" class="ecran">
    <div class="go-contenu">
        <div class="go-coins"></div>
        <div id="archi-res-etoiles">★★★</div>
        <div id="archi-res-nom" class="go-titre"></div>
        <div class="go-separateur"></div>
        <div class="go-stats">
            <div class="go-stat">
                <span class="go-stat-label">SCORE</span>
                <span class="go-stat-valeur jaune" id="archi-res-score">0</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label">PRECISION</span>
                <span class="go-stat-valeur vert" id="archi-res-precision">0%</span>
            </div>
            <div class="go-stat">
                <span class="go-stat-label">PIECES</span>
                <span class="go-stat-valeur cyan" id="archi-res-pieces">0</span>
            </div>
        </div>
        <div class="go-boutons">
            <button
                id="archi-res-btn-suivant"
                class="bouton"
                type="button"
                aria-label="Niveau suivant"
            >
                ▶ SUIVANT
            </button>
            <button
                id="archi-res-niveaux"
                class="bouton discret"
                type="button"
                aria-label="Liste des niveaux"
            >
                NIVEAUX
            </button>
            <button
                id="archi-res-menu"
                class="bouton discret"
                type="button"
                aria-label="Retour au menu"
            >
                MENU
            </button>
        </div>
    </div>
</div>
