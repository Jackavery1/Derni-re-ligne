<div id="ecran-pause-coop" class="ecran">
    <div class="pause-contenu">
        <div class="pause-titre">⏸ PAUSE COOP</div>
        <div class="pause-stats-jeu">
            <div>
                <span class="stat-label">SCORE</span>
                <span class="val" id="coop-pause-score">0</span>
            </div>
            <div>
                <span class="stat-label">NIVEAU</span>
                <span class="val" id="coop-pause-niveau">1</span>
            </div>
        </div>
        <div class="pause-boutons">
            <button
                class="bouton"
                type="button"
                id="btn-coop-reprendre"
                aria-label="Reprendre la partie coop"
            >
                ▶ REPRENDRE
            </button>
            <button
                class="bouton rose"
                type="button"
                id="btn-coop-rejouer"
                aria-label="Rejouer en coop"
            >
                ↺ REJOUER
            </button>
            <button
                class="bouton discret"
                type="button"
                id="btn-coop-quitter"
                aria-label="Quitter le mode coop"
            >
                ✕ QUITTER
            </button>
        </div>
    </div>
</div>
