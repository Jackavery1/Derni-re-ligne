<div id="ecran-titre" class="ecran actif">
    <!-- Canvas d'animation : tétrominos qui tombent -->
    <canvas id="canvas-menu-fond"></canvas>

    <!-- Contenu centré -->
    <div class="menu-contenu">
        <!-- Logo animé -->
        <div class="menu-logo">
            <div class="menu-etoiles">✦ ✦ ✦</div>
            <div class="menu-titre-dl" aria-label="Dernière Ligne">
                <div class="dl-mot-1 menu-titre-1">
                    <span class="lettre-titre lettre-t">D</span>
                    <span class="lettre-titre lettre-e">E</span>
                    <span class="lettre-titre lettre-t2">R</span>
                    <span class="lettre-titre lettre-r">N</span>
                    <span class="lettre-titre lettre-i">I</span>
                    <span class="lettre-titre lettre-e">E</span>
                    <span class="lettre-titre lettre-t2">R</span>
                    <span class="lettre-titre lettre-s">E</span>
                </div>
                <span class="dl-mot-2">LIGNE</span>
            </div>
        </div>

        <img
            class="menu-robot"
            src="img/robo-accueil.png"
            width="108"
            height="108"
            alt=""
            aria-hidden="true"
        />

        <!-- ========== BOUTON PRINCIPAL ========== -->
        <div class="menu-bloc-principal">
            <button
                id="btn-mode-histoire"
                class="btn-menu btn-histoire"
                type="button"
                aria-label="Ouvrir le mode Histoire"
            >
                <span class="btn-icone">⚡</span>
                <span class="btn-texte">MODE HISTOIRE</span>
                <span class="btn-sous-titre">La Fragmentation</span>
            </button>
        </div>

        <!-- ========== MODE LIBRE ========== -->
        <div class="menu-separateur" id="menu-separateur-libre">
            <span>— MODE LIBRE —</span>
        </div>

        <div class="menu-bloc-libre" id="menu-bloc-libre">
            <button
                id="btn-jouer"
                class="btn-menu btn-jouer btn-verrouille"
                type="button"
                data-condition="Complétez le Chapitre I"
                aria-label="Monde Libre — Complétez le Chapitre I"
                aria-disabled="true"
                disabled
            >
                <span class="btn-icone">★</span>
                <span class="btn-texte">MONDE LIBRE</span>
            </button>

            <button
                id="btn-architecte"
                class="btn-menu btn-architecte btn-verrouille"
                type="button"
                data-condition="Battez la Distorsion"
                aria-label="Architecte — Battez la Distorsion"
                aria-disabled="true"
                disabled
            >
                <span class="btn-icone">▦</span>
                <span class="btn-texte">ARCHITECTE</span>
            </button>
        </div>

        <!-- ========== COLLECTION ========== -->
        <div class="menu-separateur" id="menu-separateur-collection">
            <span>— COLLECTION —</span>
        </div>

        <div class="menu-bloc-collection" id="menu-bloc-collection">
            <button
                id="btn-codex"
                class="btn-menu btn-codex btn-verrouille"
                type="button"
                data-condition="Complétez le Prologue"
                aria-label="Codex — Complétez le Prologue"
                aria-disabled="true"
                disabled
            >
                <span class="btn-icone">📖</span>
                <span class="btn-texte">CODEX</span>
            </button>

            <button
                id="btn-profil"
                class="btn-menu btn-profil btn-verrouille"
                type="button"
                data-condition="Complétez le Chapitre II"
                aria-label="Profil — Complétez le Chapitre II"
                aria-disabled="true"
                disabled
            >
                <span class="btn-icone">◈</span>
                <span class="btn-texte">PROFIL</span>
            </button>

            <button
                id="btn-achievements"
                class="btn-menu btn-achievements btn-verrouille"
                type="button"
                data-condition="Complétez le Chapitre III"
                aria-label="Achievements — Complétez le Chapitre III"
                aria-disabled="true"
                disabled
            >
                <span class="btn-icone">🏆</span>
                <span class="btn-texte">ACHIEVEMENTS</span>
            </button>
        </div>

        <button
            class="bouton discret"
            type="button"
            id="btn-options"
            aria-label="Ouvrir les options"
        >
            ⚙ OPTIONS
        </button>
    </div>
</div>

     ÉCRAN ACHIEVEMENTS
======================================================== -->
