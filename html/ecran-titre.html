<div id="ecran-titre" class="ecran actif">
    <!-- Canvas d'animation : tetrominos qui tombent -->
    <canvas id="canvas-menu-fond"></canvas>

    <!-- Contenu centre -->
    <div class="menu-contenu">
        <!-- Logo anime -->
        <div class="menu-logo">
            <div class="menu-etoiles">✦ ✦ ✦</div>
            <div id="menu-titre-dl" class="menu-titre-dl" aria-label="Derniere Ligne">
                <div class="dl-mot-1 menu-titre-1">
                    <span class="lettre-titre lettre-t">D</span>
                    <span class="lettre-titre lettre-e">E</span>
                    <span class="lettre-titre lettre-t2">R</span>
                    <span class="lettre-titre lettre-r">N</span>
                    <span class="lettre-titre lettre-i">I</span>
                    <span class="lettre-titre lettre-e">E</span>
                    <span class="lettre-titre lettre-t2">R</span>
                    <span class="lettre-titre lettre-s">E</span>
                </div>
                <span class="dl-mot-2">LIGNE</span>
            </div>
        </div>

        <img
            class="menu-robot"
            src="img/robo-accueil.png"
            width="108"
            height="108"
            alt=""
            aria-hidden="true"
        />

        <!-- ========== BOUTON PRINCIPAL ========== -->
        <div class="menu-bloc-principal">
            <button
                id="btn-mode-histoire"
                class="btn-menu btn-histoire"
                type="button"
                aria-label="Ouvrir le mode Histoire"
            >
                <span class="btn-icone">⚡</span>
                <span class="btn-texte">MODE HISTOIRE</span>
                <span class="btn-sous-titre">La Fragmentation</span>
            </button>
        </div>

        <!-- ========== MODE LIBRE ========== -->
        <div class="menu-separateur element-masque" id="menu-separateur-libre" aria-hidden="true">
            <span>— MODE LIBRE —</span>
        </div>

        <div class="menu-bloc-libre element-masque" id="menu-bloc-libre" aria-hidden="true">
            <button
                id="btn-jouer"
                class="btn-menu btn-jouer element-masque"
                type="button"
                data-condition="Completez le Chapitre I"
                aria-label="Ouvrir le Monde Libre"
                aria-hidden="true"
                hidden
            >
                <span class="btn-icone">★</span>
                <span class="btn-texte">MONDE LIBRE</span>
            </button>

            <button
                id="btn-architecte"
                class="btn-menu btn-architecte element-masque"
                type="button"
                data-condition="Battez la Distorsion"
                aria-label="Ouvrir le mode Architecte"
                aria-hidden="true"
                hidden
            >
                <span class="btn-icone">▦</span>
                <span class="btn-texte">ARCHITECTE</span>
            </button>
        </div>

        <!-- ========== COLLECTION ========== -->
        <div
            class="menu-separateur element-masque"
            id="menu-separateur-collection"
            aria-hidden="true"
        >
            <span>— COLLECTION —</span>
        </div>

        <div
            class="menu-bloc-collection element-masque"
            id="menu-bloc-collection"
            aria-hidden="true"
        >
            <button
                id="btn-codex"
                class="btn-menu btn-codex element-masque"
                type="button"
                data-condition="Completez le Prologue"
                aria-label="Ouvrir le Codex"
                aria-hidden="true"
                hidden
            >
                <span class="btn-icone">📖</span>
                <span class="btn-texte">CODEX</span>
            </button>

            <button
                id="btn-profil"
                class="btn-menu btn-profil element-masque"
                type="button"
                data-condition="Completez le Chapitre II"
                aria-label="Voir le profil de jeu"
                aria-hidden="true"
                hidden
            >
                <span class="btn-icone">◈</span>
                <span class="btn-texte">PROFIL</span>
            </button>

            <button
                id="btn-achievements"
                class="btn-menu btn-achievements element-masque"
                type="button"
                data-condition="Completez le Chapitre III"
                aria-label="Voir les achievements"
                aria-hidden="true"
                hidden
            >
                <span class="btn-icone">🏆</span>
                <span class="btn-texte">ACHIEVEMENTS</span>
            </button>
        </div>

        <button
            class="bouton discret"
            type="button"
            id="btn-options"
            aria-label="Ouvrir les options"
        >
            ⚙ OPTIONS
        </button>
    </div>
</div>

     ECRAN ACHIEVEMENTS
