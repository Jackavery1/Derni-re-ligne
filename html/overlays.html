<div
    id="dialog-nouvelle-partie"
    class="dialog-nouvelle-partie element-masque"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="dialog-nouvelle-partie-titre"
    aria-describedby="dialog-nouvelle-partie-texte"
    aria-hidden="true"
>
    <div class="dialog-nouvelle-partie-corps">
        <p id="dialog-nouvelle-partie-titre" class="dialog-nouvelle-partie-titre">
            NOUVELLE PARTIE ?
        </p>
        <p id="dialog-nouvelle-partie-texte" class="dialog-nouvelle-partie-texte">
            Toute la progression sera effacee : campagne, cutscenes, modes debloques, codex,
            achievements et records. Vos reglages (volume, touches, accessibilite) seront conserves.
        </p>
        <div class="dialog-nouvelle-partie-actions">
            <button type="button" id="btn-annuler-nouvelle-partie" class="bouton discret">
                ANNULER
            </button>
            <button type="button" id="btn-confirm-nouvelle-partie" class="bouton bouton-danger">
                OUI, RECOMMENCER
            </button>
        </div>
    </div>
</div>

<div id="notif-niveau" role="status" aria-live="polite" aria-atomic="true">NIVEAU 2 !</div>

<div id="notif-achievement" role="status" aria-live="polite" aria-atomic="true">
    <div class="ach-badge">
        <span id="ach-icone"></span>
    </div>
    <div class="ach-texte">
        <div class="ach-entete">ACHIEVEMENT DEBLOQUE</div>
        <div id="ach-nom"></div>
        <div id="ach-description"></div>
    </div>
</div>

<div id="notif-oracle" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="notif-codex" role="status" aria-live="polite" aria-atomic="true">
    <div class="codex-notif-icone-wrap">
        <canvas id="codex-notif-icone" width="48" height="48" aria-hidden="true"></canvas>
    </div>
    <div class="codex-notif-texte">
        <div class="codex-notif-label">CODEX MIS À JOUR</div>
        <div id="codex-notif-chapitre" class="codex-notif-chapitre"></div>
        <div id="codex-notif-titre" class="codex-notif-titre"></div>
    </div>
</div>

<div id="banniere-meteo" role="status" aria-live="polite" aria-atomic="true">
    <span id="meteo-icone"></span>
    <span id="meteo-texte"></span>
    <div id="meteo-barre-alerte"></div>
</div>

<div id="banniere-vivant" role="status" aria-live="polite" aria-atomic="true">
    <span id="vivant-icone"></span>
    <div class="vivant-textes">
        <span id="vivant-nom"></span>
        <span id="vivant-desc"></span>
    </div>
    <div id="vivant-compte-rebours"></div>
</div>

<div
    id="overlay-tutoriel"
    class="overlay-tutoriel element-masque"
    role="dialog"
    aria-modal="true"
    aria-labelledby="tutoriel-titre"
>
    <div class="overlay-tutoriel-contenu">
        <h2 id="tutoriel-titre" class="tutoriel-titre">BIENVENUE DANS DERNIERE LIGNE</h2>
        <p id="tutoriel-indicateur" class="tutoriel-indicateur" aria-hidden="true"></p>
        <div id="tutoriel-corps"></div>
        <div id="tutoriel-controles" class="tutoriel-controles element-masque"></div>
        <div class="tutoriel-actions">
            <button class="bouton bouton-jouer" type="button" id="btn-tutoriel-fermer">
                COMPRIS — COMMENCER
            </button>
        </div>
    </div>
</div>

<div
    id="overlay-infobulle-contexte"
    class="overlay-infobulle-contexte element-masque"
    role="dialog"
    aria-modal="true"
    aria-labelledby="infobulle-contexte-titre"
>
    <div class="overlay-infobulle-contenu">
        <h3 id="infobulle-contexte-titre" class="infobulle-contexte-titre"></h3>
        <p id="infobulle-contexte-texte" class="infobulle-contexte-texte"></p>
        <button class="bouton discret" type="button" id="btn-infobulle-contexte-fermer">
            COMPRIS
        </button>
    </div>
</div>

<div
    id="panneau-detail"
    class="panneau-detail element-masque"
    role="dialog"
    aria-modal="false"
    aria-labelledby="panneau-detail-titre"
    aria-hidden="true"
>
    <div id="panneau-detail-backdrop" class="panneau-detail-backdrop" aria-hidden="true"></div>
    <aside id="panneau-detail-corps" class="panneau-detail-corps panneau-meta">
        <button
            type="button"
            id="btn-panneau-detail-fermer"
            class="panneau-detail-fermer"
            aria-label="Fermer le panneau de detail"
        >
            ✕
        </button>
        <div id="panneau-detail-icone-wrap" class="panneau-detail-icone-wrap">
            <canvas id="panneau-detail-icone" width="160" height="160" aria-hidden="true"></canvas>
        </div>
        <h2 id="panneau-detail-titre" class="panneau-detail-titre"></h2>
        <p id="panneau-detail-sous-titre" class="panneau-detail-sous-titre"></p>
        <div id="panneau-detail-description" class="panneau-detail-description" tabindex="0"></div>
        <div id="panneau-detail-progression" class="panneau-detail-progression element-masque">
            <div class="panneau-detail-progression-track">
                <div
                    id="panneau-detail-progression-fill"
                    class="panneau-detail-progression-fill"
                ></div>
            </div>
            <div
                id="panneau-detail-progression-texte"
                class="panneau-detail-progression-texte"
            ></div>
        </div>
        <ul id="panneau-detail-meta" class="panneau-detail-meta element-masque"></ul>
        <p id="panneau-detail-condition" class="panneau-detail-condition element-masque"></p>
        <button
            type="button"
            id="btn-panneau-detail-secondaire"
            class="bouton discret panneau-detail-secondaire element-masque"
        >
            ACTION
        </button>
        <button
            type="button"
            id="btn-panneau-detail-jouer"
            class="bouton bouton-jouer panneau-detail-jouer element-masque"
        >
            ▶ JOUER
        </button>
    </aside>
</div>
