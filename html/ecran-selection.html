<div id="ecran-selection" class="ecran">
    <canvas id="canvas-constellation" aria-hidden="true"></canvas>
    <div id="selection-overlay">
        <div id="selection-header">
            <span id="sel-titre-jeu" class="sel-titre-jeu"></span>
            <span id="sel-sous-titre" class="sel-sous-titre"></span>
        </div>
        <div id="sel-info-biome" class="sel-info-biome element-masque">
            <div id="sel-biome-nom"></div>
            <div id="sel-biome-record"></div>
            <div id="sel-biome-statut"></div>
            <div id="toggle-coop-wrap" class="toggle-oracle-wrap">
                <button id="toggle-coop" class="toggle-oracle" type="button">
                    <span>👥</span>
                    <span id="coop-toggle-label">COOP : OFF</span>
                </button>
                <div class="oracle-toggle-desc">
                    J1 : WASD + Shift. J2 : Flèches + Shift droit. Sur mobile : boutons latéraux.
                </div>
            </div>
            <div id="toggle-oracle-wrap" class="toggle-oracle-wrap">
                <button id="toggle-oracle" class="toggle-oracle" type="button">
                    <span id="oracle-toggle-icone">🔮</span>
                    <span id="oracle-toggle-label">ORACLE : OFF</span>
                </button>
                <div id="oracle-toggle-desc" class="oracle-toggle-desc">
                    Activez l'Oracle pour obtenir des suggestions de placement. Déviez avec succès
                    pour multiplier votre score.
                </div>
            </div>
            <button id="sel-btn-jouer" class="bouton bouton-jouer" type="button">▶ JOUER</button>
        </div>
        <button
            class="bouton discret sel-retour"
            type="button"
            id="btn-selection-retour"
            aria-label="Retour au menu"
        >
            ← RETOUR
        </button>
    </div>
</div>
