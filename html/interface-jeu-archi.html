<div id="conteneur-principal-archi" class="element-masque">
    <div id="interface-echelle-archi">
        <div id="interface-jeu-archi">
            <aside class="panneau panneau-archi">
                <div class="section">
                    <div class="section-titre">PIECES</div>
                    <div id="archi-inventaire" class="archi-inventaire"></div>
                </div>
                <div class="section">
                    <div class="stat">
                        <span class="stat-label">PRECISION</span>
                        <span class="stat-valeur vert" id="archi-precision">0%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">UTILISEES</span>
                        <span class="stat-valeur jaune" id="archi-pieces-used">0</span>
                    </div>
                </div>
                <div class="section">
                    <div class="section-titre">CONTRÔLES</div>
                    <div class="archi-guide">
                        <div>← → Deplacer</div>
                        <div>↑/Z Tourner</div>
                        <div>↓ Descendre</div>
                        <div>ESPACE En bas</div>
                        <div>ENTREE Valider</div>
                        <div>C Changer</div>
                        <div>RETOUR Annuler</div>
                    </div>
                </div>
            </aside>
            <main id="zone-jeu-archi"></main>
            <aside class="panneau panneau-archi">
                <div class="section">
                    <div class="section-titre" id="archi-niveau-titre">NIVEAU</div>
                    <div id="archi-niveau-nom"></div>
                    <div id="archi-difficulte-etoiles"></div>
                </div>
                <div class="section">
                    <div class="stat">
                        <span class="stat-label">OBJECTIF</span>
                        <span class="stat-valeur cyan" id="archi-par">0 pieces</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">SCORE</span>
                        <span class="stat-valeur" id="archi-score">0</span>
                    </div>
                </div>
                <div class="section">
                    <div class="section-titre">ACTIVE</div>
                    <canvas
                        id="canvas-archi-preview"
                        class="canvas-preview"
                        width="104"
                        height="72"
                    ></canvas>
                </div>
                <div class="section">
                    <button
                        id="btn-pause-archi"
                        class="btn-pause-style"
                        type="button"
                        aria-label="Mettre en pause"
                    >
                        ⏸ PAUSE
                    </button>
                    <button
                        id="btn-reinit-archi"
                        type="button"
                        aria-label="Reinitialiser le niveau"
                    >
                        ↺ REINITIALISER
                    </button>
                </div>
            </aside>
        </div>
    </div>
    <div id="controles-archi">
        <div class="rangee">
            <button
                class="btn-tactile"
                id="btn-archi-gauche"
                type="button"
                aria-label="Deplacer a gauche"
            >
                ◀
            </button>
            <button class="btn-tactile" id="btn-archi-bas" type="button" aria-label="Descendre">
                ▼
            </button>
            <button
                class="btn-tactile"
                id="btn-archi-droite"
                type="button"
                aria-label="Deplacer a droite"
            >
                ▶
            </button>
            <button
                class="btn-tactile violet"
                id="btn-archi-tourner"
                type="button"
                aria-label="Tourner la piece"
            >
                ↻
            </button>
        </div>
        <div class="rangee">
            <button
                class="btn-tactile rouge"
                id="btn-archi-chute"
                type="button"
                aria-label="Descendre en bas"
            >
                ⬇
            </button>
            <button
                class="btn-tactile violet"
                id="btn-archi-changer"
                type="button"
                aria-label="Changer de piece"
            >
                C
            </button>
            <button
                class="btn-tactile jaune"
                id="btn-archi-valider"
                type="button"
                aria-label="Valider la piece"
            >
                OK
            </button>
            <button class="btn-tactile" id="btn-archi-annuler" type="button" aria-label="Annuler">
                ↩
            </button>
        </div>
    </div>
    <div id="controles-archi-paysage">
        <div class="ctrl-col ctrl-gauche">
            <button
                class="btn-tactile"
                id="btn-archi-gauche-p"
                type="button"
                aria-label="Deplacer a gauche"
            >
                ◀
            </button>
            <button
                class="btn-tactile"
                id="btn-archi-droite-p"
                type="button"
                aria-label="Deplacer a droite"
            >
                ▶
            </button>
            <button class="btn-tactile" id="btn-archi-bas-p" type="button" aria-label="Descendre">
                ▼
            </button>
        </div>
        <div class="ctrl-col ctrl-droite">
            <button
                class="btn-tactile violet"
                id="btn-archi-tourner-p"
                type="button"
                aria-label="Tourner la piece"
            >
                ↻
            </button>
            <button
                class="btn-tactile rouge"
                id="btn-archi-chute-p"
                type="button"
                aria-label="Descendre en bas"
            >
                ⬇
            </button>
            <button
                class="btn-tactile jaune"
                id="btn-archi-valider-p"
                type="button"
                aria-label="Valider"
            >
                OK
            </button>
            <button
                class="btn-tactile violet"
                id="btn-archi-changer-p"
                type="button"
                aria-label="Changer"
            >
                C
            </button>
        </div>
    </div>
</div>
