<div id="ecran-histoire-map" class="ecran">
    <canvas
        id="canvas-histoire-map"
        role="img"
        aria-label="Carte des mondes de la campagne. Utilisez la liste de sélection pour choisir un monde au clavier."
    ></canvas>

    <div id="histoire-map-overlay">
        <div id="histoire-map-header">
            <div class="histoire-titre-bloc">
                <div class="histoire-titre-principale" aria-label="Derniere Ligne">
                    <span class="dl-mot-1"
                        ><span class="lettre-titre lettre-t">D</span
                        ><span class="lettre-titre lettre-e">E</span
                        ><span class="lettre-titre lettre-t2">R</span
                        ><span class="lettre-titre lettre-r">N</span
                        ><span class="lettre-titre lettre-i">I</span
                        ><span class="lettre-titre lettre-e">E</span
                        ><span class="lettre-titre lettre-t2">R</span
                        ><span class="lettre-titre lettre-s">E</span></span
                    ><span class="dl-mot-2">LIGNE</span>
                </div>
                <div class="histoire-sous-titre">LA FRAGMENTATION</div>
            </div>
            <div class="histoire-progression">
                <div class="histoire-prog-item">
                    <span>🌍</span>
                    <span id="histoire-prog-mondes">0/17 MONDES</span>
                </div>
                <div class="histoire-prog-item">
                    <span>📔</span>
                    <span id="histoire-prog-journaux">0/9 TRANSMISSIONS</span>
                </div>
            </div>
        </div>

        <label for="histoire-monde-clavier" class="sr-only">Sélection de monde au clavier</label>
        <select
            id="histoire-monde-clavier"
            class="sr-only"
            aria-label="Sélection de monde"
        ></select>

        <div id="histoire-monde-details" class="histoire-panneau-masque">
            <div class="histoire-detail-nom"></div>
            <div class="histoire-detail-type"></div>
            <div class="histoire-detail-statut"></div>
            <div class="histoire-detail-journal"></div>
            <button
                class="bouton bouton-jouer-monde element-masque"
                type="button"
                aria-label="Lancer le monde sélectionné"
            >
                ▶ JOUER
            </button>
        </div>

        <div id="histoire-map-footer">
            <button class="bouton discret" type="button" id="btn-histoire-retour">← RETOUR</button>
        </div>
    </div>
</div>

<section id="ecran-histoire-cutscene" class="ecran" data-personnage="narrateur">
    <div class="cutscene-fond-overlay"></div>

    <div class="cutscene-portrait-zone">
        <canvas
            id="canvas-cutscene-portrait"
            width="96"
            height="96"
            class="cutscene-canvas-portrait"
        ></canvas>
        <span id="histoire-cutscene-nom" class="cutscene-nom"></span>
    </div>

    <div class="cutscene-texte-zone">
        <div id="histoire-cutscene-lignes" class="cutscene-lignes"></div>
        <div id="histoire-cutscene-progress" class="cutscene-progress"></div>
    </div>

    <div class="cutscene-controles">
        <button id="btn-cutscene-suivant" class="btn-cutscene" type="button">
            CONTINUER <span class="btn-cutscene-hint">[ Espace / Clic ]</span>
        </button>
        <button id="btn-cutscene-passer" class="btn-cutscene-passer" type="button">PASSER ›</button>
    </div>
</section>

<div id="ecran-histoire-journal" class="ecran">
    <div id="histoire-journal-contenu">
        <div class="histoire-journal-numero" id="histoire-journal-numero"></div>
        <canvas id="canvas-journal-illust" width="240" height="100" aria-hidden="true"></canvas>
        <div
            id="histoire-journal-dommage"
            class="histoire-journal-dommage element-masque"
            aria-hidden="true"
        >
            ⚠ TRANSMISSION ENDOMMAGÉE
        </div>
        <div class="histoire-journal-titre" id="histoire-journal-titre"></div>
        <div class="histoire-journal-ss-titre" id="histoire-journal-soustitre"></div>
        <div id="histoire-journal-texte" class="histoire-journal-texte-wrap"></div>
        <button class="bouton" type="button" id="btn-journal-fermer">✕ FERMER</button>
    </div>
</div>

<div id="ecran-histoire-fin" class="ecran" data-fin="">
    <canvas id="canvas-fin-bg" aria-hidden="true" class="canvas-fin-bg"></canvas>

    <div id="histoire-fin-contenu">
        <div id="histoire-fin-embleme" class="histoire-fin-embleme" aria-hidden="true">✦</div>
        <div id="histoire-fin-titre" class="histoire-fin-titre"></div>
        <div id="histoire-fin-corps" class="histoire-fin-corps"></div>
        <div class="go-separateur histoire-fin-sep-fin"></div>
        <div id="histoire-fin-stats" class="histoire-fin-stats"></div>
        <div class="histoire-fin-boutons">
            <button class="bouton" type="button" id="btn-fin-menu">RETOUR AU MENU</button>
            <button class="bouton discret" type="button" id="btn-fin-rejouer">
                ↺ REJOUER LE MODE HISTOIRE
            </button>
        </div>
        <div id="histoire-fin-hint" class="histoire-fin-hint element-masque"></div>
    </div>
</div>
