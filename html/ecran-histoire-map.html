<div id="ecran-histoire-map" class="ecran">
    <canvas
        id="canvas-histoire-map"
        role="img"
        aria-label="Carte des mondes de la campagne. Utilisez la liste de selection pour choisir un monde au clavier."
    ></canvas>

    <div id="histoire-map-overlay">
        <div id="histoire-map-header">
            <div class="histoire-titre-bloc">
                <div class="histoire-titre-principale" aria-label="Derniere Ligne">
                    <span class="dl-mot-1"
                        ><span class="lettre-titre lettre-t">D</span
                        ><span class="lettre-titre lettre-e">E</span
                        ><span class="lettre-titre lettre-t2">R</span
                        ><span class="lettre-titre lettre-r">N</span
                        ><span class="lettre-titre lettre-i">I</span
                        ><span class="lettre-titre lettre-e">E</span
                        ><span class="lettre-titre lettre-t2">R</span
                        ><span class="lettre-titre lettre-s">E</span></span
                    ><span class="dl-mot-2">LIGNE</span>
                </div>
                <div class="histoire-sous-titre">LA FRAGMENTATION</div>
            </div>
            <div class="histoire-progression">
                <div class="histoire-prog-item">
                    <span>🌍</span>
                    <span id="histoire-prog-mondes">0/17 MONDES</span>
                </div>
                <div class="histoire-prog-item">
                    <span>📔</span>
                    <span id="histoire-prog-journaux">0/9 TRANSMISSIONS</span>
                </div>
                <button
                    type="button"
                    class="histoire-prog-item histoire-prog-trame histoire-prog-trame-btn"
                    id="btn-histoire-trame"
                    aria-label="Voir les objectifs Trame Primordiale"
                    title="Objectifs pour debloquer la Trame Primordiale"
                >
                    <span aria-hidden="true">✦</span>
                    <span id="histoire-prog-trame">TRAME 0/4</span>
                </button>
            </div>
        </div>

        <div
            id="overlay-trame-conditions"
            class="objectif-overlay objectif-overlay-fermable element-masque"
            role="dialog"
            aria-modal="true"
            aria-labelledby="histoire-trame-titre"
        >
            <div class="objectif-panneau histoire-trame-panneau">
                <h2 id="histoire-trame-titre" class="objectif-chapitre">TRAME PRIMORDIALE</h2>
                <p class="histoire-trame-intro">
                    Objectifs pour debloquer le monde secret de la Trame.
                </p>
                <ul
                    id="histoire-trame-detail-liste"
                    class="histoire-trame-detail-liste"
                    aria-label="Conditions Trame"
                ></ul>
                <button type="button" class="bouton objectif-btn-commencer" id="btn-trame-fermer">
                    FERMER
                </button>
            </div>
        </div>

        <label for="histoire-monde-clavier" class="sr-only">Selection de monde au clavier</label>
        <select
            id="histoire-monde-clavier"
            class="sr-only"
            aria-label="Selection de monde"
        ></select>

        <div id="histoire-monde-details" class="histoire-panneau-masque">
            <div class="histoire-detail-nom"></div>
            <div class="histoire-detail-type"></div>
            <div class="histoire-detail-statut"></div>
            <div class="histoire-detail-etoiles" aria-label="Etoiles du monde"></div>
            <div class="histoire-detail-journal"></div>
            <p class="histoire-detail-guide element-masque" id="histoire-detail-guide"></p>
            <p class="histoire-detail-avertissement element-masque" id="histoire-detail-avert"></p>
            <button
                class="bouton bouton-jouer-monde element-masque"
                type="button"
                aria-label="Lancer le monde selectionne"
            >
                ▶ JOUER
            </button>
        </div>

        <div id="histoire-map-footer">
            <button class="bouton discret" type="button" id="btn-histoire-retour">← RETOUR</button>
        </div>
    </div>
</div>

<section
    id="ecran-histoire-cutscene"
    class="ecran cutscene-mode-dialogue"
    data-personnage="narrateur"
>
    <canvas id="canvas-cutscene-bg" aria-hidden="true"></canvas>
    <div class="letterbox-haut" aria-hidden="true"></div>
    <div class="letterbox-bas" aria-hidden="true"></div>

    <div
        id="zone-narration-cutscene"
        class="cutscene-grille-narrateur"
        aria-live="polite"
        aria-atomic="true"
    >
        <p id="cutscene-instructions-clavier" class="sr-only">
            Espace ou Entree pour avancer. Echap pour passer toute la scene.
        </p>
        <div id="texte-narration-cutscene"></div>
        <span id="indicateur-suite-narration" aria-hidden="true">▼</span>
    </div>

    <div id="rangee-portraits-cutscene" class="cutscene-grille-portraits">
        <canvas id="canvas-portrait-gauche" width="180" height="260" class="absent"></canvas>
        <canvas id="canvas-portrait-droite" width="180" height="260" class="absent"></canvas>
    </div>

    <div id="zone-dialogue-cutscene" class="cutscene-grille-dialogue">
        <div id="boite-dialogue-cutscene" aria-live="polite" aria-atomic="true">
            <div id="nom-perso-dialogue"></div>
            <div id="texte-dialogue-cutscene"></div>
            <span id="indicateur-suite-dialogue">▼</span>
        </div>
    </div>

    <div class="cutscene-barre-bas">
        <div id="histoire-cutscene-progress" class="cutscene-progress"></div>
        <div class="cutscene-controles">
            <button
                id="btn-cutscene-suivant"
                class="btn-cutscene"
                type="button"
                aria-keyshortcuts="Space Enter"
                aria-label="Continuer la scene (Espace, Entree ou clic)"
            >
                CONTINUER
                <span class="btn-cutscene-hint" aria-hidden="true">[ Espace / Clic ]</span>
            </button>
            <button
                id="btn-cutscene-passer"
                class="btn-cutscene-passer"
                type="button"
                aria-keyshortcuts="Escape"
                aria-label="Passer toute la scene (Echap)"
            >
                PASSER › <span class="btn-cutscene-hint" aria-hidden="true">[ Echap ]</span>
            </button>
        </div>
    </div>
</section>

<div id="ecran-histoire-journal" class="ecran">
    <div id="histoire-journal-contenu">
        <div class="histoire-journal-numero" id="histoire-journal-numero"></div>
        <canvas id="canvas-journal-illust" width="240" height="100" aria-hidden="true"></canvas>
        <div
            id="histoire-journal-dommage"
            class="histoire-journal-dommage element-masque"
            aria-hidden="true"
        >
            ⚠ TRANSMISSION ENDOMMAGEE
        </div>
        <div class="histoire-journal-titre" id="histoire-journal-titre"></div>
        <div class="histoire-journal-ss-titre" id="histoire-journal-soustitre"></div>
        <div id="histoire-journal-texte" class="histoire-journal-texte-wrap"></div>
        <button class="bouton" type="button" id="btn-journal-fermer">✕ FERMER</button>
    </div>
</div>

<div id="ecran-histoire-fin" class="ecran" data-fin="">
    <canvas id="canvas-fin-bg" aria-hidden="true" class="canvas-fin-bg"></canvas>

    <div id="histoire-fin-contenu">
        <div id="histoire-fin-embleme" class="histoire-fin-embleme" aria-hidden="true">✦</div>
        <div id="histoire-fin-titre" class="histoire-fin-titre"></div>
        <div id="histoire-fin-corps" class="histoire-fin-corps"></div>
        <div class="go-separateur histoire-fin-sep-fin"></div>
        <div id="histoire-fin-stats" class="histoire-fin-stats"></div>
        <div class="histoire-fin-boutons">
            <button class="bouton" type="button" id="btn-fin-menu">RETOUR AU MENU</button>
            <button class="bouton discret" type="button" id="btn-fin-rejouer">
                ↺ REJOUER LE MODE HISTOIRE
            </button>
        </div>
        <div id="histoire-fin-hint" class="histoire-fin-hint element-masque"></div>
    </div>
</div>
